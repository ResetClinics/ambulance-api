api_platform:
  title: Ambulance API
  version: 1.0.0
  description: 'API выездной службы'
  show_webby: false
  formats:
    multipart: [ 'multipart/form-data' ]
    jsonld: [ 'application/ld+json' ]
    json: [ 'application/json' ]
  swagger:
    api_keys:
      JWT:
        name: Authorization
        type: header
  defaults:
    normalization_context:
      skip_null_values: false