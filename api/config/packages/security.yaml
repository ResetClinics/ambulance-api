security:

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    role_hierarchy:
        ROLE_SUPER_ADMIN:     [ROLE_ADMIN, ROLE_DOCTOR, ROLE_APP]
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User\User
                property: phone
        app_partner_user_provider:
            entity:
                class: App\Entity\Partner\PartnerUser
                property: phone
        app_exchange_user_provider:
            entity:
                class: App\Entity\ApiUser
                property: phone
    firewalls:
        login:
            pattern: ^/api/login
            stateless: true
            provider: app_user_provider
            json_login:
                username_path: phone
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        partner_login:
            pattern: ^/partner/login
            stateless: true
            provider: app_partner_user_provider
            json_login:
                username_path: phone
                check_path: /partner/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        exchange_login:
            pattern: ^/exchange/login
            stateless: true
            provider: app_exchange_user_provider
            json_login:
                username_path: phone
                check_path: /exchange/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern:   ^/api
            stateless: true
            jwt:
                provider: app_user_provider
        partner:
            pattern:   ^/partner
            stateless: true
            jwt:
                provider: app_partner_user_provider
        exchange:
            pattern:   ^/exchange
            stateless: true
            jwt:
                provider: app_exchange_user_provider
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/partner/login, roles: PUBLIC_ACCESS }
        - { path: ^/partner, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/exchange/login, roles: PUBLIC_ACCESS }
        - { path: ^/exchange, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/sing-in, roles: PUBLIC_ACCESS }
        - { path: ^/app, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        #- { path: ^/api/uploads, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/callings, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/calls, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/medicines, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/teams, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/med_teams, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/med_teams/report-user-list, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/users, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/roles, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/permissions, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/partners, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/administrator_reports, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/files, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/shifts, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/transport_reports, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/amo-crm, roles: PUBLIC_ACCESS }
        - { path: ^/api/leads, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: PUBLIC_ACCESS }
        #- { path: ^/, roles: ROLE_APP }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
