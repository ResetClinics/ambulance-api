services:

  traefik:
    image: traefik:2.4
    command:
      --providers.docker=true
      --providers.docker.exposedByDefault=false
      --entryPoints.http.address=:80
    ports:
      - "80:80"
    networks:
      - traefik-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

  api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./api:/app
    networks:
      - traefik-public
      - default
    ports:
      - "8080:80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.api.rule=Host(`localhost`) || Host(`www.localhost`)
      - traefik.http.routers.api.entryPoints=http
      - traefik.http.services.api.loadBalancer.server.port=80
      - traefik.http.middlewares.api-redirect.redirectRegex.regex=^(https?://)www.localhost/(.*)$$
      - traefik.http.middlewares.api-redirect.redirectRegex.replacement=$${1}localhost/$${2}
      - traefik.http.middlewares.api-redirect.redirectRegex.permanent=true
      - traefik.http.routers.api.middlewares=api-redirect

  api-php-fpm:
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      PHP_IDE_CONFIG: serverName=API
      DB_HOST: ambulance-mysql
      DB_NAME: ambulance
      DB_USER: ambulance
      DB_PASSWORD: secret
      ASTERISK_DB_HOST: asterisk-postgres
      ASTERISK_DB_NAME: asterisk_db
      ASTERISK_DB_USER: user
      ASTERISK_DB_PASSWORD: secret
      SENTRY_DSN: ""
    volumes:
      - ./api:/app

  api-php-cli:
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DB_HOST: ambulance-mysql
      DB_NAME: ambulance
      DB_USER: root
      DB_PASSWORD: verysecret
      ASTERISK_DB_HOST: asterisk-postgres
      ASTERISK_DB_NAME: asterisk_db
      ASTERISK_DB_USER: user
      ASTERISK_DB_PASSWORD: secret
      SENTRY_DSN: null
    volumes:
      - ./api:/app

  ambulance-mysql:
    image: mysql:8.0
    volumes:
      - ambulance-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: verysecret
      MYSQL_DATABASE: ambulance
      MYSQL_USER: ambulance
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    command: mysqld --sql_mode=""

  asterisk-postgres:
    image: postgres:16.4-alpine
    volumes:
      - asterisk-postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: asterisk_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

volumes:
  asterisk-postgres:
    external: true
  ambulance-mysql:
    external: true

networks:
  traefik-public:
    name: traefik-public