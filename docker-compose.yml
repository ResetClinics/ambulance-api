version: "3.9"
services:

  traefik:
    image: traefik:2.4
    command:
      --providers.docker=true
      --providers.docker.exposedByDefault=false
      --entryPoints.http.address=:80
    ports:
      - "80:80"
    networks:
      - traefik-public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public

  api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./api:/app
    networks:
      - traefik-public
      - default
    ports:
      - "8080:80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.api.rule=Host(`localhost`) || Host(`www.localhost`)
      - traefik.http.routers.api.entryPoints=http
      - traefik.http.services.api.loadBalancer.server.port=80
      - traefik.http.middlewares.api-redirect.redirectRegex.regex=^(https?://)www.localhost/(.*)$$
      - traefik.http.middlewares.api-redirect.redirectRegex.replacement=$${1}localhost/$${2}
      - traefik.http.middlewares.api-redirect.redirectRegex.permanent=true
      - traefik.http.routers.api.middlewares=api-redirect

  api-php-fpm:
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      PHP_IDE_CONFIG: serverName=API
      DB_HOST: ambulance-mysql
      DB_USER: ambulance
      DB_PASSWORD: secret
      DB_NAME: ambulance
      MAILER_HOST: mailer
      MAILER_PORT: 1025
      MAILER_USER: app
      MAILER_PASSWORD: secret
      MAILER_ENCRYPTION: tcp
      MAILER_FROM_EMAIL: mail@app.test
      FRONTEND_URL: http://localhost
      SENTRY_DSN: ""
    volumes:
      - ./api:/app

  api-php-cli:
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DB_HOST: ambulance-mysql
      DB_USER: ambulance
      DB_PASSWORD: secret
      DB_NAME: ambulance
      MAILER_HOST: mailer
      MAILER_PORT: 1025
      MAILER_USER: app
      MAILER_PASSWORD: secret
      MAILER_ENCRYPTION: tcp
      MAILER_FROM_EMAIL: mail@app.test
      FRONTEND_URL: http://localhost
      SENTRY_DSN: null
    volumes:
      - ./api:/app

  ambulance-mysql:
    image: mysql:5.7.21
    volumes:
      - ambulance-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: verysecret
      MYSQL_DATABASE: ambulance
      MYSQL_USER: ambulance
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    command: mysqld --sql_mode=""

volumes:
  ambulance-mysql:

networks:
  traefik-public:
    name: traefik-public